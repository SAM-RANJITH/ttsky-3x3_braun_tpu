# Tiny Tapeout project information
project:
  title:        "3x3 Braun TPU Systolic Array"
  author:       "Sam Ranjith"
  discord:      ""
  description:  "A 3x3 systolic array based TPU using Braun multipliers with delay alignment for matrix multiplication"
  language:     "Verilog"
  clock_hz:     50000000

  tiles: "2x2"

  top_module:  "tt_um_tpu_braun"

  source_files:
    - "tt_um_tpu_braun.v"
    - "systolic_array_3x3.v"
    - "pe_braun.v"
    - "braun_multiplier.v"
    - "control_unit.v"
    - "input_loader.v"
    - "output_mux.v"
    - "delay_cell.v"

# Pinout description
pinout:
  ui[0]: "Data input bit0"
  ui[1]: "Data input bit1"
  ui[2]: "Data input bit2"
  ui[3]: "Data input bit3"
  ui[4]: "Data input bit4"
  ui[5]: "Data input bit5"
  ui[6]: "Data input bit6"
  ui[7]: "Data input bit7"

  uo[0]: "Result output bit0"
  uo[1]: "Result output bit1"
  uo[2]: "Result output bit2"
  uo[3]: "Result output bit3"
  uo[4]: "Result output bit4"
  uo[5]: "Result output bit5"
  uo[6]: "Result output bit6"
  uo[7]: "Result output bit7"

  uio[0]: "Output index bit0"
  uio[1]: "Output index bit1"
  uio[2]: "Output index bit2"
  uio[3]: "Output index bit3"
  uio[4]: "Done signal"
  uio[5]: "Valid output"
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
