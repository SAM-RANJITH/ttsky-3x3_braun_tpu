# Tiny Tapeout project information
project:
  title:        "3x3 Braun TPU Systolic Array"
  author:       "Sam Ranjith"
  discord:      ""
  description:  "3x3 systolic array TPU using Braun multipliers for matrix multiplication with pipelined data flow"
  language:     "Verilog"
  clock_hz:     50000000

  tiles: 2x2

  top_module:  "tt_um_tpu_braun"

  source_files:
    - "tt_um_tpu_braun.v"
    - "systolic_array_3x3.v"
    - "pe_braun.v"
    - "braun_multiplier.v"
    - "control_unit.v"
    - "input_loader.v"
    - "output_mux.v"
    - "delay_cell.v"

# Pinout description
pinout:
  ui[0]: "Input data bit 0"
  ui[1]: "Input data bit 1"
  ui[2]: "Input data bit 2"
  ui[3]: "Input data bit 3"
  ui[4]: "Input data bit 4"
  ui[5]: "Input data bit 5"
  ui[6]: "Input data bit 6"
  ui[7]: "Input data bit 7"

  uo[0]: "Output data bit 0"
  uo[1]: "Output data bit 1"
  uo[2]: "Output data bit 2"
  uo[3]: "Output data bit 3"
  uo[4]: "Output data bit 4"
  uo[5]: "Output data bit 5"
  uo[6]: "Output data bit 6"
  uo[7]: "Output data bit 7"

  uio[0]: "Output index bit 0"
  uio[1]: "Output index bit 1"
  uio[2]: "Output index bit 2"
  uio[3]: "Output index bit 3"
  uio[4]: "Done signal"
  uio[5]: "Valid output"
  uio[6]: "Unused"
  uio[7]: "Unused"

yaml_version: 6
